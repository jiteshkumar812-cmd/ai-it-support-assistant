apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aks-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: acraiitdev001.azurecr.io/backend:v1
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/tickets
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tickets
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20